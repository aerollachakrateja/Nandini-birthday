<!DOCTYPE html>
<html lang="en">
<head>
    <title>Happy Birthday Nandini ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }

        #lockScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        button {
            padding: 12px 20px;
            background: pink;
            border: none;
            border-radius: 20px;
            margin-top: 15px;
        }

        h1 {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff4da6; }
            to { text-shadow: 0 0 25px #ff99cc; }
        }

        .msg {
            background: #222;
            padding: 10px;
            margin: 8px;
            border-radius: 10px;
        }

        .heart {
            position: fixed;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }

        .closeBtn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="lockScreen">
    <h2>Enter Our Special Date 💖</h2>
    <input id="dateInput" placeholder="dd-mm-yyyy">
    <button onclick="checkDate()">Unlock</button>
    <p id="error"></p>
</div>

<div id="mainContent" style="display:none;">

    <h1>Happy Birthday Nandini ❤️</h1>

    <button onclick="startExperience()">Start</button>

    <p id="message"></p>
    <div id="typing"></div>
    <div id="chatbox"></div>

    <button onclick="finalSurprise()">Final Surprise</button>

    <audio id="bgMusic" loop>
        <source src="music.mp3">
    </audio>

    <audio id="finalSong">
        <source src="Mysong.mp3">
    </audio>

</div>

<script>

function checkDate() {
    if (document.getElementById("dateInput").value === "14-02-2026") {
        lockScreen.style.display = "none";
        mainContent.style.display = "block";
    } else {
        error.innerText = "Try again 💔";
    }
}

function startExperience() {
    let music = document.getElementById("bgMusic");
    music.volume = 1;
    music.play();

    document.getElementById("message").innerText =
    "I never thought an exam phase would give me something so special... but it gave me you 💖";
}

// FINAL SURPRISE
function finalSurprise() {

    let main = document.getElementById("mainContent");
    main.style.filter = "blur(6px)";
    main.style.opacity = "0.3";

    let div = document.createElement("div");

    div.style.position = "fixed";
    div.style.top = "0";
    div.style.left = "0";
    div.style.width = "100%";
    div.style.height = "100%";
    div.style.display = "flex";
    div.style.justifyContent = "center";
    div.style.alignItems = "center";
    div.style.flexDirection = "column";
    div.style.zIndex = "9999";

    div.innerHTML = `
        <div class="closeBtn" onclick="location.reload()">✖</div>

        <h1>I Love You Sooo Much Nandini ❤️</h1>

        <p>
            Happy Birthday Nanduuu 🎂✨ <br><br>
            No matter how far you go,<br>
            No matter how life changes...<br><br>
            you'll always be my favorite person 💖
        </p>

        <p style="margin-top:20px;">
            I made this for you… ❤️ <br>
            It’s not perfect, but it’s from my heart 💖
        </p>

        <button onclick="playMySong(this)">
            ▶ Play My Song
        </button>
    `;

    document.body.appendChild(div);
}

// PLAY SONG
function playMySong(btn) {

    let bg = document.getElementById("bgMusic");
    let song = document.getElementById("finalSong");

    let fade = setInterval(() => {
        if (bg.volume > 0.05) {
            bg.volume -= 0.05;
        } else {
            bg.pause();
            clearInterval(fade);
        }
    }, 200);

    setTimeout(() => {
        song.volume = 1;
        song.play().catch(() => {
            alert("Tap again 💖");
        });
    }, 800);

    btn.style.display = "none";
}

// HEARTS
setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = "❤️";
    h.className = "heart";
    h.style.left = Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
}, 300);

</script>

</body>
</html>
