<!DOCTYPE html>
<html lang="en">
<head>
    <title>Happy Birthday Nandini ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
            overflow-x: hidden;
        }
        input {
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
            text-align: center;
        }
        .gallery {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
        }
        
        .gallery img {
            width: 180px;
            height: 260px;
            object-fit: cover;
            border-radius: 20px;
        }

        #lockScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        button {
            padding: 12px 20px;
            background: pink;
            border: none;
            border-radius: 20px;
            margin-top: 15px;
        }

        h1 {
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff4da6; }
            to { text-shadow: 0 0 25px #ff99cc; }
        }

        .msg {
            background: #222;
            padding: 10px;
            margin: 8px;
            border-radius: 10px;
        }

        .heart {
            position: fixed;
            animation: floatUp 5s linear infinite;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }

        .closeBtn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div id="lockScreen">
    <h2>Enter Our Special Date 💖</h2>
    <input id="dateInput" placeholder="dd-mm-yyyy">
    <button onclick="checkDate()">Unlock</button>
    <p id="error"></p>
</div>

<div id="mainContent" style="display:none;">

    <h1>Happy Birthday Nandini ❤️</h1>

    <button onclick="startExperience()">Start</button>

    <p id="message"></p>
    <div id="typing"></div>
    <div id="chatbox"></div>

    <button onclick="finalSurprise()">Final Surprise</button>
    <div class="gallery">
        <img src="img1.jpeg">
        <img src="img2.jpeg">
        <img src="img3.jpeg">
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3">
    </audio>

    <audio id="finalSong">
        <source src="Mysong.mp3">
    </audio>

</div>

<script>

function checkDate() {
    let input = document.getElementById("dateInput").value;

    if (input === "14-02-2026") {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        document.getElementById("error").innerText = "Try again love {Secret: It is the date we confessed} 💔";
    }
}
function startExperience() {
    let music = document.getElementById("bgMusic");
    music.volume = 0;
    music.play();

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else clearInterval(fade);
    }, 200);

    document.getElementById("message").innerText =
    "I never thought an exam phase would give me something so special... but it gave me you 💖";

    typeEffect();   // ✅ IMPORTANT
    startChat();    // ✅ IMPORTANT
}
let lines = [
    "We started as just two people talking...",
    "Then calls happened...",
    "Then Instagram happened...",
    "And slowly, you became the most important part of my life 💖"
];

function typeEffect() {
    let i = 0;
    let box = document.getElementById("typing");

    function showLine() {
        if (i >= lines.length) return;

        let p = document.createElement("p");
        p.innerText = lines[i];
        box.appendChild(p);

        i++;
        setTimeout(showLine, 1200);
    }

    showLine();
}

let messages = [
    "Hey Nandini 💖",
    "Do you remember those exam days?",
    "Back then, I didn’t know you’d mean this much to me...",
    "Then we started talking on Instagram 😄",
    "And somehow… everything changed ❤️",
    "You became my comfort, my happiness 💕",
    "Now you’re going far away to Georgia 🌍",
    "But distance can’t change what you mean to me 💖",
    "I’ll always be right here for you… no matter what ❤️"
];

function startChat() {
    let index = 0;
    let box = document.getElementById("chatbox");

    let interval = setInterval(() => {
        if (index >= messages.length) return;

        let div = document.createElement("div");
        div.className = "msg";
        div.innerText = messages[index];
        box.appendChild(div);

        index++;
    }, 1200);
}
// FINAL SURPRISE
function finalSurprise() {

    let main = document.getElementById("mainContent");
    main.style.filter = "blur(6px)";
    main.style.opacity = "0.3";

    let div = document.createElement("div");

    div.style.position = "fixed";
    div.style.top = "0";
    div.style.left = "0";
    div.style.width = "100%";
    div.style.height = "100%";
    div.style.display = "flex";
    div.style.justifyContent = "center";
    div.style.alignItems = "center";
    div.style.flexDirection = "column";
    div.style.zIndex = "9999";

    div.innerHTML = `
        <div class="closeBtn" onclick="location.reload()">✖</div>

        <h1>I Love You Sooo Much Nanduuuu ❤️</h1>

        <p>
            Happy Birthday Nanduuu 🎂✨ <br><br>
            No matter how far you go,<br>
            No matter how life changes...<br><br>
            you'll always be my favorite person 💖
        </p>

        <p style="margin-top:20px; font-size:18px;">
            I wanted to give you something special... ❤️ <br>
            So I tried something I've never done before 💖
        </p>
        
        <p style="margin-top:10px; font-size:16px; opacity:0.8;">
            Just listen till the end... 🎧
        </p>
        <button onclick="playMySong(this)">
            ▶ Play something i made for you
        </button>
    `;

    document.body.appendChild(div);
}

// PLAY SONG
function playMySong(btn) {

    let bg = document.getElementById("bgMusic");
    let song = document.getElementById("finalSong");

    let fade = setInterval(() => {
        if (bg.volume > 0.05) {
            bg.volume -= 0.05;
        } else {
            bg.pause();
            clearInterval(fade);
        }
    }, 200);

    setTimeout(() => {

        song.volume = 0;
        song.play().catch(() => {
            alert("Tap again 💖");
        });
    
        let v = 0;
        let fadeIn = setInterval(() => {
            if (v < 1) {
                v += 0.05;
                song.volume = v;
            } else clearInterval(fadeIn);
        }, 200);
    
    }, 800);
    btn.style.display = "none";
    }

// HEARTS
setInterval(() => {
    let h = document.createElement("div");
    h.innerHTML = "❤️";
    h.className = "heart";
    h.style.left = Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
}, 300);

</script>

</body>
</html>
